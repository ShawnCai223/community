<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ajax</title>
</head>
<body>
        <p>
            <input type="button" value="Send" onclick="send();">
        </p>

        <script src="https://code.jquery.com/jquery-3.3.1.min.js" crossorigin="anonymous"></script>
        <script>
            function send() {
                $.post(
                    "/community/alpha/ajex",
                    {"name":"harry", "age":30},
                    function (data) {
                        console.log(typeof(data));
                        console.log(data);
                        data = $.parse(data);
                        console.log(typeof(data));
                        console.log(data.code);
                        console.log(data.msg);
                    })
            }
        </script>
</body>
</html>
